schema_version: 1

context:
  name: e3sm_to_cmip
  version: "1.14.0"
  python_min: "3.11"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/E3SM-Project/${{ name }}/archive/v${{ version }}.tar.gz
  sha256: 5355f515f171bccadd664525c74470fdc269dda05caad93ded5952026a6b198d

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - cmor >=3.7.0
    - dask
    - nco >=5.1.4
    - netcdf4
    - numpy >=2.0.0,<3.0.0
    - pyyaml
    - tqdm
    - xarray >=2024.03.0
    - xcdat >=0.11.1,<1.0.0

tests:
  - python:
      imports:
        - e3sm_to_cmip
      pip_check: false
      python_version: 
        - ${{ python_min }}.*
        - "*"
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - e3sm_to_cmip --help

about:
  license: BSD-3-Clause
  license_file: LICENSE
  summary: A cli utility to transform E3SM model output into CMIP compatible data.
  description: |
    Transform e3sm time series variables into cmip compatible data. Each
    variable needs its own handler script, implemented in the cmor_handlers
    directory (see directory for current handlers). In addition, you will need
    to clone the cmor repo (https://github.com/PCMDI/cmor) to access the Test
    and Tables directories. Test holds the common_user_input.json file which
    can be used as a placeholder for the user supplied metadata, and Tables
    holds all the CMIP6 variable tables.
  homepage: https://github.com/E3SM-Project/e3sm_to_cmip
  repository: https://github.com/E3SM-Project/e3sm_to_cmip
  documentation: https://github.com/E3SM-Project/e3sm_to_cmip

extra:
  recipe-maintainers:
    - xylar
    - tomvothecoder
    - chengzhuzhang
